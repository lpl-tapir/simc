[paths]
outPath = /zippy/MARS/targ/xped/Sourdough2022/clutter_sims
navPath = 
sigPath =

[navigation]
navsys = +proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs
navfunc = GetNav_DJI

[simParams]
speedLight = 299792458
# dt is the time per sample in the MALA Geodrone 80
dt = 0.78125e-9 
traceSamples = 768 
body = earth
demBump = False
demInterp = False
#when centerPlane is set to True, sim.py calculates the center coordinates of the plane 
centerPlane = True
antenna_pattern = half_wave_dipole
swathAngle = 0

[facetParams]
atDist = 100
ctDist = 100
atStep = 0.5
ctStep = 0.5

[outputs]
showNadir = False
showFret = False
combinedAdj = True
combined = False
combinedColored = False
left = True
right = True
binary = True
echomap = False
echomapAdj = False
echomapColored = False
echomapGeoref = False
red = True
nadir = True
fret = True
#Export facets require center_plane = True
exportFacetsArray = False
exportFacetsArrayH5 = False
